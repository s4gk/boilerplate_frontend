name: Deploy Frontend Staging

on:
  push:
    branches:
      - development  # Se dispara al subir cambios a development

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # 1. Entrar a la carpeta de staging
            cd /srv/crm/staging
            
            # 2. Entrar a la carpeta del frontend y limpiar cambios locales (como el next.config.ts)
            cd frontend
            git fetch origin development
            git checkout next.config.ts
            git pull origin development
            
            # 3. Regresar a la raíz de staging y levantar Docker
            cd ..
            docker compose up -d --build frontend
            
            # 4. Limpiar imágenes viejas para no llenar el disco
            docker image prune -f
