name: Deploy Frontend Staging

on:
  push:
    branches:
      - development  # Se dispara al subir cambios a development

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Entramos a la carpeta de staging que me mostró
            cd /srv/crm/staging
            
            # Bajamos los últimos cambios de la rama development
            git pull origin development
            
            # Reconstruimos solo el servicio del frontend
            # --build obliga a recrear la imagen si hubo cambios en el código
            # -d es para que corra en segundo plano
            docker-compose up -d --build frontend
            
            # Opcional: Limpiar imágenes huérfanas para no llenar el disco
            docker image prune -f
